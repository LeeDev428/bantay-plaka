{% if messages %}
  <div class="space-y-2 mb-4">
    {% for message in messages %}
      <div role="alert" class="alert {% if message.tags == 'error' %}alert-error{% elif message.tags == 'success' %}alert-success{% elif message.tags == 'warning' %}alert-warning{% else %}alert-info{% endif %} shadow">
        <i class="fa {% if message.tags == 'error' %}fa-circle-xmark{% elif message.tags == 'success' %}fa-circle-check{% else %}fa-circle-info{% endif %}"></i>
        <span>{{ message }}</span>
      </div>
    {% endfor %}
  </div>
{% endif %}
