{% if messages %}
  <div style="margin-bottom:14px;">
    {% for message in messages %}
      <div class="alert-msg {% if message.tags == 'error' %}error{% elif message.tags == 'success' %}success{% elif message.tags == 'warning' %}warning{% else %}info{% endif %}">
        <i class="fa {% if message.tags == 'error' %}fa-circle-xmark{% elif message.tags == 'success' %}fa-circle-check{% else %}fa-circle-info{% endif %}" style="margin-right:6px;"></i>
        {{ message }}
      </div>
    {% endfor %}
  </div>
{% endif %}
