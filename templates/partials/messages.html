{% if messages %}
  <div class="space-y-2 mb-4">
    {% for message in messages %}
      <div class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm border
        {% if message.tags == 'error' %}bg-red-50 border-red-200 text-red-700
        {% elif message.tags == 'success' %}bg-emerald-50 border-emerald-200 text-emerald-700
        {% elif message.tags == 'warning' %}bg-amber-50 border-amber-200 text-amber-700
        {% else %}bg-blue-50 border-blue-200 text-blue-700{% endif %}">
        <i class="fa {% if message.tags == 'error' %}fa-circle-xmark{% elif message.tags == 'success' %}fa-circle-check{% elif message.tags == 'warning' %}fa-triangle-exclamation{% else %}fa-circle-info{% endif %}"></i>
        <span>{{ message }}</span>
      </div>
    {% endfor %}
  </div>
{% endif %}
