{% load static %}
<aside id="sidebar">

  <!-- Logo Area -->
  <div class="logo-area">
    <img src="{% static 'img/bantayplaka.png' %}" alt="BantayPlaka Logo" />
    <div class="logo-text">
      <span class="logo-bantay">BANTAY</span>
      <span class="logo-plaka">PLAKA</span>
    </div>
    <p class="logo-sub">Automatic Number Plate Recognition-Based Vehicle Monitoring System</p>
  </div>

  <!-- Navigation -->
  <nav>
    <a href="{% url 'dashboard' %}"
       class="{% if request.resolver_match.url_name == 'admin_dashboard' or request.resolver_match.url_name == 'guard_dashboard' or request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
      <i class="fa fa-gauge-high"></i> Dashboard
    </a>
    <a href="{% url 'camera_feed' %}"
       class="{% if request.resolver_match.url_name == 'camera_feed' %}active{% endif %}">
      <i class="fa fa-video"></i> Live Camera Feed
    </a>
    <a href="{% url 'log_list' %}"
       class="{% if 'log' in request.resolver_match.url_name and request.resolver_match.url_name != 'manual_entry' %}active{% endif %}">
      <i class="fa fa-car"></i> Vehicle Logs
    </a>
    <a href="{% url 'visitor_list' %}"
       class="{% if 'visitor' in request.resolver_match.url_name %}active{% endif %}">
      <i class="fa fa-users"></i> Guest Logs
    </a>
    <a href="{% url 'settings' %}"
       class="{% if request.resolver_match.url_name == 'settings' %}active{% endif %}">
      <i class="fa fa-gear"></i> Settings
    </a>

    {% if user.is_admin %}
    <a href="{% url 'resident_list' %}"
       class="{% if 'resident' in request.resolver_match.url_name %}active{% endif %}">
      <i class="fa fa-house-user"></i> Residents
    </a>
    <a href="{% url 'user_management' %}"
       class="{% if 'user' in request.resolver_match.url_name %}active{% endif %}">
      <i class="fa fa-users-gear"></i> User Mgmt
    </a>
    {% endif %}
  </nav>

  <!-- Clock -->
  <div class="clock-area">
    <div class="clock-label">Current Time</div>
    <span id="live-clock">12:00:00 AM</span>
  </div>

</aside>
