<script>
(function () {
  const protocol = window.location.protocol === 'https:' ? 'wss' : 'ws';
  const socket = new WebSocket(`${protocol}://${window.location.host}/ws/logs/`);
  const tbody = document.getElementById('live-log-body');

  socket.onmessage = function (e) {
    const data = JSON.parse(e.data);

    const typeBadge = data.entry_type === 'RESIDENT'
      ? '<span class="badge badge-success badge-sm">RESIDENT</span>'
      : data.entry_type === 'VISITOR'
        ? '<span class="badge badge-warning badge-sm">VISITOR</span>'
        : '<span class="badge badge-ghost badge-sm">UNKNOWN</span>';

    const statusBadge = data.status === 'TIME_IN'
      ? '<span class="badge badge-info badge-sm"><i class="fa fa-arrow-right-to-bracket mr-1"></i>TIME IN</span>'
      : '<span class="badge badge-error badge-sm"><i class="fa fa-arrow-right-from-bracket mr-1"></i>TIME OUT</span>';

    const sourceBadge = data.source === 'MANUAL'
      ? '<span class="badge badge-outline badge-sm"><i class="fa fa-keyboard mr-1"></i>Manual</span>'
      : '<span class="badge badge-outline badge-sm badge-success"><i class="fa fa-camera mr-1"></i>Camera</span>';

    const row = document.createElement('tr');
    row.id = `log-row-${data.id}`;
    row.classList.add('bg-base-200', 'transition-all');
    row.innerHTML = `
      <td class="font-mono font-bold">${data.plate_number}</td>
      <td>${data.display_name}</td>
      <td>${typeBadge}</td>
      <td>${statusBadge}</td>
      <td>${sourceBadge}</td>
      <td class="text-xs text-base-content/60">${data.timestamp}</td>
    `;

    // remove empty state row if present
    const emptyRow = tbody.querySelector('td[colspan]');
    if (emptyRow) emptyRow.closest('tr').remove();

    tbody.insertBefore(row, tbody.firstChild);

    // flash highlight
    setTimeout(() => row.classList.remove('bg-base-200'), 1500);
  };

  socket.onopen = () => console.log('[BantayPlaka] WebSocket connected.');
  socket.onclose = () => console.warn('[BantayPlaka] WebSocket disconnected.');
})();
</script>
