<script>
(function () {
  const protocol = window.location.protocol === 'https:' ? 'wss' : 'ws';
  const socket = new WebSocket(`${protocol}://${window.location.host}/ws/logs/`);
  const tbody = document.getElementById('live-log-body');

  socket.onmessage = function (e) {
    const data = JSON.parse(e.data);

    const typeBadge = data.entry_type === 'RESIDENT'
      ? '<span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-emerald-100 text-emerald-700">Resident</span>'
      : data.entry_type === 'VISITOR'
        ? '<span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-amber-100 text-amber-700">Visitor</span>'
        : '<span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-slate-100 text-slate-600">Unknown</span>';

    const statusBadge = data.status === 'TIME_IN'
      ? '<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-medium bg-blue-100 text-blue-700"><i class="fa fa-arrow-right text-[9px]"></i> IN</span>'
      : '<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-700"><i class="fa fa-arrow-left text-[9px]"></i> OUT</span>';

    const sourceBadge = data.source === 'MANUAL'
      ? '<span class="inline-flex items-center gap-1 text-xs text-slate-500"><i class="fa fa-keyboard text-[10px]"></i> Manual</span>'
      : '<span class="inline-flex items-center gap-1 text-xs text-emerald-600"><i class="fa fa-camera text-[10px]"></i> Camera</span>';

    const row = document.createElement('tr');
    row.id = `log-row-${data.id}`;
    row.classList.add('bg-blue-50', 'transition-all', 'duration-700');
    row.innerHTML = `
      <td class="font-mono font-semibold text-slate-800">${data.plate_number}</td>
      <td class="text-sm text-slate-600">${data.display_name}</td>
      <td>${typeBadge}</td>
      <td>${statusBadge}</td>
      <td>${sourceBadge}</td>
      <td class="text-xs text-slate-400">${data.timestamp}</td>
    `;

    const emptyRow = tbody.querySelector('td[colspan]');
    if (emptyRow) emptyRow.closest('tr').remove();

    tbody.insertBefore(row, tbody.firstChild);
    setTimeout(() => row.classList.remove('bg-blue-50'), 2000);
  };

  socket.onopen = () => console.log('[BantayPlaka] WebSocket connected.');
  socket.onclose = () => console.warn('[BantayPlaka] WebSocket disconnected.');
})();
</script>
